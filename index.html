<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MiFlix</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --red:#E50914;--red2:#b20710;
      --bg:#080808;--bg2:#111;--bg3:#1a1a1a;
      --muted:#999;--muted2:#555;
      --fd:'Bebas Neue',sans-serif;
      --fb:'Outfit',sans-serif;
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:#fff;font-family:var(--fb);overflow-x:hidden}

    /* NAV */
    .navbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:linear-gradient(to bottom,rgba(0,0,0,0.9),transparent)}
    .nav-left{display:flex;align-items:center;gap:20px}
    .logo{font-family:var(--fd);font-size:26px;color:var(--red);letter-spacing:3px;cursor:pointer;user-select:none}
    .filter-bar{display:flex;gap:4px}
    .fbtn{background:none;border:1px solid rgba(255,255,255,.15);color:var(--muted);font-family:var(--fb);font-size:12px;padding:5px 14px;border-radius:20px;cursor:pointer;transition:all .2s}
    .fbtn:hover{border-color:rgba(255,255,255,.4);color:#fff}
    .fbtn.active{background:#fff;color:#000;border-color:#fff;font-weight:500}
    .nav-right{display:flex;align-items:center;gap:14px}
    .search-box{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 14px}
    .search-box input{background:none;border:none;outline:none;color:#fff;font-family:var(--fb);font-size:13px;width:200px}
    .search-box input::placeholder{color:var(--muted2)}
    .avatar{width:32px;height:32px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:pointer}

    /* HERO */
    .hero{position:relative;height:90vh;display:flex;align-items:flex-end;padding-bottom:5rem}
    .hero-bg{position:absolute;inset:0}
    .hero-bg img{width:100%;height:100%;object-fit:cover;object-position:center 20%;filter:brightness(.45)}
    .hero-grad{position:absolute;inset:0;background:linear-gradient(to right,rgba(8,8,8,.92) 38%,transparent),linear-gradient(to top,rgba(8,8,8,1) 0%,transparent 50%)}
    .hero-content{position:relative;z-index:2;padding:0 3rem;max-width:560px}
    .hero-pill{display:inline-block;background:var(--red);color:#fff;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:3px 12px;border-radius:4px;margin-bottom:12px}
    .hero-title{font-family:var(--fd);font-size:clamp(3rem,6vw,5.5rem);line-height:1;letter-spacing:1px;margin-bottom:10px}
    .hero-meta{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    .hero-match{color:#46d369;font-size:13px;font-weight:500}
    .hero-badge{border:1px solid #aaa;color:#ccc;font-size:10px;padding:2px 7px;border-radius:3px}
    .hero-dur{color:var(--muted);font-size:13px}
    .hero-desc{font-size:14px;line-height:1.7;color:rgba(255,255,255,.75);margin-bottom:1.5rem}
    .hero-btns{display:flex;gap:10px}

    /* BUTTONS */
    .btn-red{background:var(--red);color:#fff;border:none;padding:10px 24px;border-radius:6px;font-family:var(--fb);font-size:14px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .2s}
    .btn-red:hover{background:var(--red2)}
    .btn-ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2);padding:10px 22px;border-radius:6px;font-family:var(--fb);font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .2s}
    .btn-ghost:hover{background:rgba(255,255,255,.22)}
    .btn-sm{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.18);padding:10px 20px;border-radius:6px;font-family:var(--fb);font-size:13px;cursor:pointer;transition:background .2s}
    .btn-sm:hover{background:rgba(255,255,255,.2)}

    /* CATALOG */
    .categories{padding:0 2rem 5rem}
    .cat-section{margin-bottom:2.5rem}
    .cat-title{font-size:16px;font-weight:500;color:#ddd;margin-bottom:14px;padding-left:4px}
    .movies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}

    /* CARD */
    .card{border-radius:8px;overflow:hidden;background:var(--bg3);cursor:pointer;transition:transform .25s,box-shadow .25s}
    .card:hover{transform:scale(1.05);box-shadow:0 16px 50px rgba(0,0,0,.7);position:relative;z-index:2}
    .card-img-wrap{position:relative;aspect-ratio:2/3;overflow:hidden}
    .card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
    .card:hover .card-img-wrap img{transform:scale(1.06)}
    .card-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);opacity:0;transition:opacity .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
    .card:hover .card-overlay{opacity:1}
    .play-circle{width:40px;height:40px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center}
    .card-star{color:#ffd700;font-size:12px;font-weight:500}
    .type-pill{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.2);color:#ddd;font-size:9px;font-weight:600;letter-spacing:.5px;padding:2px 8px;border-radius:10px;text-transform:uppercase}
    .card-info{padding:9px 10px 11px}
    .card-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#e0e0e0}
    .card-sub{font-size:10px;color:var(--muted2);margin-top:3px}

    /* DETAIL */
    .detail-view{display:none;flex-direction:column}
    .detail-hero{position:relative;height:400px;overflow:hidden}
    .detail-hero img{width:100%;height:100%;object-fit:cover;object-position:center 20%;filter:brightness(.4)}
    .detail-grad{position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(8,8,8,.4) 50%,transparent)}
    .back-btn{position:absolute;top:80px;left:24px;display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.15);color:#ddd;font-family:var(--fb);font-size:13px;padding:7px 16px;border-radius:7px;cursor:pointer;transition:background .2s}
    .back-btn:hover{background:rgba(0,0,0,.8);color:#fff}
    .detail-hero-text{position:absolute;bottom:28px;left:28px;right:28px}
    .type-pill-lg{display:inline-block;background:var(--red);color:#fff;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:3px 12px;border-radius:4px;margin-bottom:10px}
    .detail-title{font-family:var(--fd);font-size:clamp(2.5rem,5vw,4.5rem);line-height:1;letter-spacing:1px;margin-bottom:10px}
    .detail-badges{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .match-text{color:#46d369;font-size:13px;font-weight:500}
    .bdg{border:1px solid #999;color:#ccc;font-size:10px;padding:2px 7px;border-radius:3px}
    .bdg-txt{color:var(--muted);font-size:13px}
    .detail-body{padding:0 28px 50px}
    .player-wrap{display:none;margin-bottom:24px;border-radius:10px;overflow:hidden;position:relative;background:#000}
    .player-wrap iframe{width:100%;aspect-ratio:16/9;border:none;display:block}
    .player-close{position:absolute;top:12px;left:14px;z-index:10;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.2);color:#fff;font-family:var(--fb);font-size:12px;padding:6px 16px;border-radius:6px;cursor:pointer}
    .player-close:hover{background:rgba(0,0,0,.9)}
    .detail-main{display:grid;grid-template-columns:1fr 260px;gap:32px;padding-top:8px;margin-bottom:32px}
    .detail-actions{display:flex;gap:10px;margin-bottom:16px}
    .detail-desc{font-size:14px;line-height:1.75;color:rgba(255,255,255,.75)}
    .rating-block{display:flex;align-items:center;gap:10px;margin-bottom:16px}
    .rating-num{font-size:26px;font-weight:500;color:#ffd700}
    .rating-stars{color:#ffd700;font-size:13px;letter-spacing:1px}
    .rating-label{font-size:11px;color:var(--muted)}
    .meta-item{display:flex;gap:6px;margin-bottom:10px;font-size:13px;align-items:flex-start}
    .meta-label{color:var(--muted2);min-width:70px;flex-shrink:0}
    .meta-val{color:#ccc}
    .tags-wrap{display:flex;flex-wrap:wrap;gap:5px}
    .meta-tag{display:inline-block;background:var(--bg3);border:1px solid #2a2a2a;color:#bbb;font-size:11px;padding:2px 10px;border-radius:5px}
    .similar-title{font-size:16px;font-weight:500;color:#ddd;margin-bottom:14px}
    .similar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
    .sim-card{border-radius:7px;overflow:hidden;cursor:pointer;background:var(--bg3);transition:transform .2s}
    .sim-card:hover{transform:scale(1.04)}
    .sim-card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block}
    .sim-info{padding:7px 8px}
    .sim-title{font-size:11px;font-weight:500;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sim-sub{font-size:10px;color:var(--muted2);margin-top:2px}

    @media(max-width:640px){
      .navbar{padding:12px 16px}
      .filter-bar{display:none}
      .search-box input{width:110px}
      .hero-content{padding:0 1.2rem}
      .categories{padding:0 1rem 4rem}
      .detail-main{grid-template-columns:1fr}
      .detail-body{padding:0 16px 40px}
      .back-btn{top:70px;left:14px}
    }
  </style>
</head>

let currentFilter = "all";
let currentMovie = null;

function getFiltered() {
  return currentFilter === "all" ? movies : movies.filter(m => m.type === currentFilter);
}

function groupByGenre(list) {
  const map = new Map();
  map.set("Todos", list);
  list.forEach(m => m.genres.forEach(g => {
    if (!map.has(g)) map.set(g, []);
    map.get(g).push(m);
  }));
  const result = [];
  map.forEach((ms, name) => { if (ms.length > 0) result.push({ name, movies: ms }); });
  return result;
}

function stars(r) {
  const f = Math.round(r / 2);
  return "★".repeat(f) + "☆".repeat(5 - f);
}

function createCard(movie) {
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="card-img-wrap">
      <img src="${movie.poster}" alt="${movie.title}" loading="lazy"
        onerror="this.src='https://via.placeholder.com/300x450/111/444?text=?'"/>
      <div class="card-overlay">
        <div class="play-circle">
          <svg viewBox="0 0 24 24" fill="white" width="18" height="18"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <span class="card-star">★ ${movie.rating}</span>
      </div>
      <span class="type-pill">${movie.type}</span>
    </div>
    <div class="card-info">
      <p class="card-name">${movie.title}</p>
      <p class="card-sub">${movie.year} · ${movie.genres[0]}</p>
    </div>`;
  card.addEventListener("click", () => openDetail(movie));
  return card;
}

function createSimCard(movie) {
  const card = document.createElement("div");
  card.className = "sim-card";
  card.innerHTML = `
    <img src="${movie.poster}" alt="${movie.title}" loading="lazy"/>
    <div class="sim-info">
      <p class="sim-title">${movie.title}</p>
      <p class="sim-sub">${movie.year} · ${movie.genres[0]}</p>
    </div>`;
  card.addEventListener("click", () => openDetail(movie));
  return card;
}

function openDetail(movie) {
  currentMovie = movie;
  document.getElementById("catalog-view").style.display = "none";
  document.getElementById("detail-view").style.display = "flex";

  document.getElementById("d-backdrop").src = movie.backdrop;
  document.getElementById("d-type").textContent = movie.type;
  document.getElementById("d-title").textContent = movie.title;
  document.getElementById("d-match").textContent = movie.match + " relevante";
  document.getElementById("d-age").textContent = movie.age;
  document.getElementById("d-year").textContent = movie.year;
  document.getElementById("d-dur").textContent = movie.duration;
  document.getElementById("d-desc").textContent = movie.description;
  document.getElementById("d-rating").textContent = "★ " + movie.rating;
  document.getElementById("d-stars").textContent = stars(movie.rating);
  document.getElementById("d-genres").textContent = movie.genres.join(" / ");
  document.getElementById("d-year2").textContent = movie.year;
  document.getElementById("d-dur2").textContent = movie.duration;
  document.getElementById("d-actors").textContent = movie.actors.join(", ");
  document.getElementById("d-tags").innerHTML = movie.tags.map(t => `<span class="meta-tag">${t}</span>`).join("");

  closePlayer();

  const simGrid = document.getElementById("similar-grid");
  simGrid.innerHTML = "";
  movies
    .filter(m => m.id !== movie.id && m.genres.some(g => movie.genres.includes(g)))
    .slice(0, 4)
    .forEach(m => simGrid.appendChild(createSimCard(m)));

  window.scrollTo(0, 0);
}

function playMovie() {
  if (!currentMovie) return;
  const wrap = document.getElementById("player-wrap");
  document.getElementById("player-frame").src = currentMovie.streamUrl;
  wrap.style.display = "block";
  wrap.scrollIntoView({ behavior: "smooth", block: "start" });
}

function closePlayer() {
  document.getElementById("player-wrap").style.display = "none";
  document.getElementById("player-frame").src = "";
}

function showCatalog() {
  document.getElementById("catalog-view").style.display = "block";
  document.getElementById("detail-view").style.display = "none";
  closePlayer();
  currentMovie = null;
}

function renderCatalog() {
  const container = document.getElementById("categories");
  container.innerHTML = "";
  groupByGenre(getFiltered()).forEach(group => {
    if (group.movies.length === 0) return;
    const section = document.createElement("section");
    section.className = "cat-section";
    section.innerHTML = `<h2 class="cat-title">${group.name}</h2><div class="movies-grid"></div>`;
    group.movies.forEach(m => section.querySelector(".movies-grid").appendChild(createCard(m)));
    container.appendChild(section);
  });
}

// Init
renderCatalog();

// Filters
document.querySelectorAll(".fbtn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    renderCatalog();
  });
});

// Search
document.getElementById("search-input").addEventListener("input", function() {
  const q = this.value.toLowerCase().trim();
  const container = document.getElementById("categories");
  container.innerHTML = "";
  const results = q
    ? movies.filter(m =>
        m.title.toLowerCase().includes(q) ||
        m.genres.some(g => g.toLowerCase().includes(q)) ||
        m.actors.some(a => a.toLowerCase().includes(q))
      )
    : getFiltered();
  const section = document.createElement("section");
  section.className = "cat-section";
  section.innerHTML = `<h2 class="cat-title">${q ? 'Resultados para "' + this.value + '"' : "Todos"}</h2><div class="movies-grid"></div>`;
  const grid = section.querySelector(".movies-grid");
  if (results.length === 0) {
    grid.innerHTML = `<p style="color:#555;padding:1rem 0;font-size:14px">Sin resultados.</p>`;
  } else {
    results.forEach(m => grid.appendChild(createCard(m)));
  }
  container.appendChild(section);
});

// Buttons
document.getElementById("logo-btn").addEventListener("click", showCatalog);
document.getElementById("back-btn").addEventListener("click", showCatalog);
document.getElementById("btn-play-detail").addEventListener("click", playMovie);
document.getElementById("player-close-btn").addEventListener("click", closePlayer);

const featured = movies[2];
document.getElementById("hero-play-btn").addEventListener("click", () => {
  openDetail(featured);
  setTimeout(playMovie, 150);
});
document.getElementById("hero-info-btn").addEventListener("click", () => openDetail(featured));
</script>
</body>
</html>
